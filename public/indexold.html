<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星迹 StarryChat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 登录/注册页面 -->
<div id="authPage">
  <div class="auth-box" id="loginBox">
    <h2>登录 星迹</h2>
    <input id="loginUser" placeholder="用户名" />
    <input id="loginPassword" type="password" placeholder="密码" />
    <button onclick="login()">登录</button>
    <div class="switch" onclick="showRegister()">还没有账号？注册</div>
    <div id="loginError" class="error"></div>
  </div>
  <div class="auth-box" id="regBox" style="display:none;">
    <h2>注册 星迹</h2>
    <input id="regUsername" placeholder="用户名" />
    <input id="regPassword" type="password" placeholder="密码" />
    <input id="regStudentId" placeholder="学号（选填）" />
    <button onclick="register()">注册</button>
    <div class="switch" onclick="showLogin()">已有账号？登录</div>
    <div id="regError" class="error"></div>
  </div>
</div>

<!-- 聊天室主体 -->
<div id="chatApp">
  <div class="top-bar">
    <span>✦ 星迹</span>
    <div>
      <img id="myAvatarImg" src="" title="点击换头像" />
      <button onclick="logout()" style="margin-left:10px; background:#555; border:none; color:#fff; padding:5px 10px; border-radius:4px;">退出</button>
    </div>
  </div>
  <div style="display:flex; flex:1; height:calc(100% - 56px);">
    <div class="sidebar">
      <div class="room-list" id="roomList"></div>
      <button class="create-room-btn" onclick="showCreateRoom()">+ 创建房间</button>
    </div>
    <div class="main">
      <div class="chat-header" id="chatHeader">🏠 大厅</div>
      <div class="member-list" id="memberList"></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="input-area">
        <input type="file" id="fileInput" multiple accept="image/*,video/*,.pdf,.doc,.docx,.txt">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="messageInput" placeholder="输入消息..." />
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div class="debug-panel" id="debugPanel"></div>
    </div>
  </div>
</div>
<button class="toggle-debug" onclick="toggleDebug()">Debug</button>

<!-- 创建房间弹窗 -->
<div id="createRoomModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:200;">
  <div style="background:#2d2d30; padding:30px; border-radius:12px; width:320px; color:#fff;">
    <h3>创建房间</h3>
    <input id="roomNameInput" placeholder="房间名" style="width:100%; margin:10px 0; padding:10px; border-radius:6px; border:none; background:#3c3c3c; color:#fff;"/>
    <input id="roomPwdInput" placeholder="密码（留空公开）" type="password" style="width:100%; margin:10px 0; padding:10px; border-radius:6px; border:none; background:#3c3c3c; color:#fff;"/>
    <button onclick="createRoom()" style="padding:10px 20px; background:#07c160; border:none; border-radius:6px; color:#fff; cursor:pointer;">创建</button>
    <button onclick="document.getElementById('createRoomModal').style.display='none'" style="margin-left:10px; padding:10px 20px; background:#555; border:none; border-radius:6px; color:#fff; cursor:pointer;">取消</button>
  </div>
</div>

<script src="client.js"></script>
</body>
</html>
